<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level Editor</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>

  <body>
    <header>
      <h1>Level Editor</h1>
    </header>

    <div class="workspace">
      <div class="sidebar">
        <div class="sidebar-section">
          <div class="section-label">Tiles</div>

          <button
            class="tile-btn"
            data-tile="start"
            onclick="selectTile('start', this)"
          >
            <span class="tile-dot" style="background: #b5e61d"></span>
            Start
          </button>

          <button
            class="tile-btn"
            data-tile="end"
            onclick="selectTile('end', this)"
          >
            <span class="tile-dot" style="background: #ffc90e"></span>
            End
          </button>

          <button
            class="tile-btn"
            data-tile="debris"
            onclick="selectTile('debris', this)"
          >
            <span class="tile-dot" style="background: #595959"></span>
            Debris
          </button>

          <button
            class="tile-btn"
            data-tile="house"
            onclick="selectTile('house', this)"
          >
            <span class="tile-dot" style="background: #b97a57"></span>
            House
          </button>
        </div>

        <div class="sidebar-section">
          <div class="section-label">Level settings</div>

          <div class="meta">
            <label>Level name</label>
            <input
              type="text"
              id="level-name"
              value="level_01"
              placeholder="level_01"
            />
          </div>

          <div class="meta">
            <label>Grid size</label>

            <input
              type="number"
              id="grid-size"
              value="8"
              min="4"
              max="16"
              onchange="resizeGrid()"
            />
          </div>

          <div class="meta">
            <label>Starting moves</label>
            <input type="number" id="start-moves" value="15" min="1" max="99" />
          </div>
        </div>
      </div>

      <div class="canvas-area">
        <canvas id="grid-canvas"></canvas>
      </div>
    </div>

    <div class="bottom-bar">
      <span id="status">Ready</span>

      <div class="btn-group">
        <button class="btn danger" onclick="clearGrid()">Clear</button>
        <button class="btn" onclick="importJSON()">Import JSON</button>
        <button class="btn primary" onclick="exportJSON()">Export JSON</button>
      </div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
