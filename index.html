<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Level Editor</title>
        <link rel="stylesheet" href="src/style.css" />
    </head>

    <body>
        <header>
            <h1>Level Editor</h1>
        </header>

        <div class="workspace">
            <div class="sidebar sidebar-tiles">
                <div class="sidebar-section">
                    <div class="section-label">Tiles</div>

                    <button
                        class="tile-btn"
                        data-tile="start"
                        onclick="selectTile('start', this)"
                    >
                        <span
                            class="tile-dot"
                            style="background: #b5e61d"
                        ></span>
                        Start
                    </button>

                    <button
                        class="tile-btn"
                        data-tile="end"
                        onclick="selectTile('end', this)"
                    >
                        <span
                            class="tile-dot"
                            style="background: #ffc90e"
                        ></span>
                        End
                    </button>

                    <button
                        class="tile-btn"
                        data-tile="debris"
                        onclick="selectTile('debris', this)"
                    >
                        <span
                            class="tile-dot"
                            style="background: #595959"
                        ></span>
                        Debris
                    </button>

                    <button
                        class="tile-btn"
                        data-tile="house"
                        onclick="selectTile('house', this)"
                    >
                        <span
                            class="tile-dot"
                            style="background: #b97a57"
                        ></span>
                        House
                    </button>

                    <button
                        class="tile-btn"
                        data-tile="hotspot"
                        onclick="selectTile('hotspot', this)"
                    >
                        <span
                            class="tile-dot"
                            style="background: #ff7f27"
                        ></span>
                        Hotspot
                    </button>
                </div>

                <div class="sidebar-section">
                    <div class="section-label">Enemies/Obstacles</div>

                    <button
                        class="tile-btn"
                        data-tile="asteroid"
                        onclick="selectTile('asteroid', this)"
                    >
                        <span
                            class="tile-dot"
                            style="background: #7f7f7f"
                        ></span>
                        Asteroid
                    </button>

                    <button
                        class="tile-btn"
                        data-tile="asteroid_path"
                        onclick="selectTile('asteroid_path', this)"
                    >
                        <span
                            class="tile-dot"
                            style="background: #16162d"
                        ></span>
                        Asteroid Path
                    </button>

                    <button
                        class="tile-btn"
                        data-tile="pirate"
                        onclick="selectTile('pirate', this)"
                    >
                        <span
                            class="tile-dot"
                            style="background: #a349a4"
                        ></span>
                        Pirate
                    </button>

                    <button
                        class="tile-btn"
                        data-tile="blackhole"
                        onclick="selectTile('blackhole', this)"
                    >
                        <span
                            class="tile-dot"
                            style="background: #ed1c24"
                        ></span>
                        Black Hole
                    </button>
                </div>

                <div class="sidebar-section">
                    <div class="section-label">Portals</div>

                    <button
                        class="tile-btn"
                        data-tile="portal_up"
                        onclick="selectTile('portal_up', this)"
                    >
                        <span
                            class="tile-dot"
                            style="background: #00a2e8"
                        ></span>
                        Portal Up
                    </button>

                    <button
                        class="tile-btn"
                        data-tile="portal_down"
                        onclick="selectTile('portal_down', this)"
                    >
                        <span
                            class="tile-dot"
                            style="background: #00a2e8"
                        ></span>
                        Portal Down
                    </button>

                    <button
                        class="tile-btn"
                        data-tile="portal_left"
                        onclick="selectTile('portal_left', this)"
                    >
                        <span
                            class="tile-dot"
                            style="background: #00a2e8"
                        ></span>
                        Portal Left
                    </button>

                    <button
                        class="tile-btn"
                        data-tile="portal_right"
                        onclick="selectTile('portal_right', this)"
                    >
                        <span
                            class="tile-dot"
                            style="background: #00a2e8"
                        ></span>
                        Portal Right
                    </button>
                </div>
            </div>

            <div class="canvas-area">
                <canvas id="grid-canvas"></canvas>
            </div>

            <div class="sidebar sidebar-meta">
                <div class="sidebar-section">
                    <div class="section-label">Level settings</div>

                    <div class="meta">
                        <label>Level name</label>
                        <input
                            type="text"
                            id="level-name"
                            value="level_01"
                            placeholder="level_01"
                        />
                    </div>

                    <div class="meta">
                        <label>Grid size</label>

                        <input
                            type="number"
                            id="grid-size"
                            value="8"
                            min="4"
                            max="16"
                            onchange="resizeGrid()"
                        />
                    </div>

                    <div class="meta">
                        <label>Starting moves</label>
                        <input
                            type="number"
                            id="start-moves"
                            value="15"
                            min="1"
                            max="99"
                        />
                    </div>

                    <div class="meta">
                        <label>Parcel type</label>
                        <select id="parcel-type">
                            <option value="normal">Normal</option>
                            <option value="fragile">Fragile</option>
                            <option value="flammable">Flammable</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <button class="btn danger" onclick="clearGrid()">Clear</button>
            <button class="btn" onclick="importJSON()">Import JSON</button>
            <button class="btn primary" onclick="exportJSON()">
                Export JSON
            </button>
        </div>

        <script type="module" src="src/main.js"></script>
    </body>
</html>
